name: 构建并自动发布 Release

# 触发条件：推送到 main 或 master 分支
on:
  push:
    branches: [ "main", "master" ]
  # 也支持手动触发，方便测试
  workflow_dispatch:

# 权限设置：让 Action 有权限创建 Release 和上传文件
permissions:
  contents: write
  pull-requests: read

env:
  MINECRAFT_VERSION: 1.21.1
  JAVA_VERSION: 21

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 签出代码
      - name: 签出仓库代码
        uses: actions/checkout@v4

      # 2. 设置 Java 21
      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # 3. 赋予 Gradle 可执行权限
      - name: 使 Gradlew 可执行
        run: chmod +x ./gradlew

      # 4. 缓存 Gradle 依赖（加速构建）
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. 执行构建
      - name: 构建模组
        run: ./gradlew clean build

      # 6. 提取版本号（从 gradle.properties 读取 mod_version）
      - name: 提取版本号
        id: get_version
        run: |
          # 从 gradle.properties 中读取 mod_version
          VERSION=$(grep "^mod_version" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          # 如果没找到，使用默认值
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "提取到的版本号: $VERSION"

      # 7. 显示构建产物列表（方便调试）
      - name: 列出构建产物
        run: ls -l build/libs/

      # 8. 创建 GitHub Release 并上传模组文件
      - name: 创建 Release 并上传构建产物
        uses: softprops/action-gh-release@v2
        with:
          # 使用提取到的版本号作为 Release 标签（会自动创建标签）
          tag_name: v${{ steps.get_version.outputs.version }}
          # Release 名称
          name: 版本 v${{ steps.get_version.outputs.version }}
          # 自动生成发布说明（从上次 Release 到现在的提交记录）
          generate_release_notes: true
          # 要上传的文件（支持通配符）
          files: |
            build/libs/*.jar
            # 如果有 API 或 sources 包，可以一并上传
            # build/libs/*-sources.jar
            # build/libs/*-dev.jar
          # 如果标签已存在，覆盖已有的 Release（方便修复后重新推送）
          # 注意：如果不想覆盖，可以设置为 false
          # 这里设为 true，方便你反复推送修复
          overwrite: true
        env:
          # 注意：这里使用 GITHUB_TOKEN，它是 GitHub 自动生成的，无需手动配置
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}