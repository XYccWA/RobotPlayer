name: 构建并发布 NeoForge 模组

# 触发条件：推送到 main 或 master 分支时自动执行，也支持手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 全局环境变量，方便统一修改
env:
  MINECRAFT_VERSION: 1.21.1
  JAVA_VERSION: 21              # NeoForge 1.21.1 要求 Java 21
  MOD_VERSION: 1.0.0            # 你可以改成动态获取版本号，这里先写死方便测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 签出代码
      - name: 签出仓库代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 设置 Java 21
      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # 3. 赋予 Gradle 可执行权限（Linux 环境必需）
      - name: 使 Gradlew 可执行
        run: chmod +x ./gradlew

      # 4. 缓存 Gradle 依赖，加速后续构建
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. 核心构建命令：构建模组
      - name: 构建模组
        run: ./gradlew clean build

      # 6. (可选) 显示构建产物列表，方便调试
      - name: 列出构建产物
        run: ls -l build/libs/

      # 7. 上传构建产物到 GitHub Actions 页面，方便你手动下载
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod-${{ env.MOD_VERSION }}
          path: build/libs/*.jar

      # 8. (进阶) 自动发布到 CurseForge 和 Modrinth
      #    需要先在仓库 Settings -> Secrets 中配置 CURSEFORGE_TOKEN 和 MODRINTH_TOKEN
      - name: 发布到 Modrinth 和 CurseForge
        # 使用社区通用的 mc-publish Action，支持 NeoForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # 从仓库 Secrets 中读取令牌，如果未配置，该步骤会自动跳过
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # 重要：你需要把自己的项目 ID 填进去，在平台项目页面的 URL 里可以找到
          curseforge-id: YOUR_CURSEFORGE_PROJECT_ID
          modrinth-id: YOUR_MODRINTH_PROJECT_ID

          # 版本号和发布类型
          version: ${{ env.MOD_VERSION }}
          version-type: release

          # 指定要发布的文件（排除 -dev 或 -sources 后缀的文件）
          files: build/libs/!(*-dev*).jar

          # 关键：指明模组加载器为 NEOFORGE
          loaders: neoforge
          game-versions: ${{ env.MINECRAFT_VERSION }}
          java: ${{ env.JAVA_VERSION }}